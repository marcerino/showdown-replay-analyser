<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Showdown Analyser</title>
        <style>
            body {
                font-family: sans-serif;
                padding: 20px;
                line-height: 1.6;
                background-color: #f4f4f9;
            }
            .container {
                max-width: 800px;
                margin: auto;
                background: white;
                padding: 20px;
                border-radius: 8px;
            }
            input,
            select,
            button {
                padding: 10px;
                margin: 5px 0;
                width: 100%;
                box-sizing: border-box;
            }
            button {
                background-color: #2d89ef;
                color: white;
                border: none;
                cursor: pointer;
                font-weight: bold;
            }
            button:hover {
                background-color: #1e5bb8;
            }
            #output {
                margin-top: 20px;
                white-space: pre-wrap;
                background: #eee;
                padding: 15px;
                border-radius: 4px;
                max-height: 400px;
                overflow-y: auto;
                font-family: monospace;
                font-size: 13px;
            }
        </style>
    </head>
    <body>
        <div class="container">
            <h2>Replay Log Fetcher</h2>

            <label for="urlInput">Log URL:</label>
            <input
                type="text"
                id="urlInput"
                placeholder="https://replay.pokemonshowdown.com/..."
            />

            <label for="versionSelect">Select Format/Version:</label>
            <select id="versionSelect">
                <option value="Null"></option>
                <option value="Season 4">Season 4</option>
                <option value="Test">Test</option>
            </select>

            <button onclick="main()">Get Log Information</button>

            <div id="output">Results will appear here...</div>
        </div>

        <script>
            /*
             * Does not work if "|" is in Username
             */
            function extractnamefromline(line) {
                return line.split("|")[3];
            }

            function extractpokemonfromline(line) {
                return line.split("|")[3].split(", ")[0]; // replace(", M", "").replace(", F", "") this feels magicky but is due to the log beeing this format "|poke|p1|Grimmsnarl, M|"
            }

            function killattribution(statedict, rows, index) {
                let row = rows[index];
                let target = extractnamefromline(row);
            }

            function analyze(rows) {
                class Condition {
                    constructor(source, effect, target) {
                        this.source = source;
                        this.effect = effect;
                        this.target = target;
                    }
                    // Method to display Conditions's details
                    displayDetails() {
                        console.log(
                            `Source: ${this.source}, Effect: ${this.effect}, Target: ${this.target}`,
                        );
                    }
                }

                let Conditiontracker = [];
                let stateDict = {
                    Player1: "",
                    Player2: "",
                    Team1: new Set(),
                    Team2: new Set(),
                    Killdict: {},
                    win: "",
                };

                for (let i = 0; i < rows.length; i++) {
                    let line = rows[i];

                    switch (true) {
                        case line.includes("|player|p1|"):
                            stateDict.Player1 = extractnamefromline(line);
                            break;
                        case line.includes("|player|p2|"):
                            stateDict.Player2 = extractnamefromline(line);
                            break;
                        case line.includes("|switch|p1"):
                            stateDict.Team1.add(extractpokemonfromline(line));
                            break;
                        case line.includes("|switch|p2"):
                            stateDict.Team2.add(extractpokemonfromline(line));
                            break;
                        case line.includes("|poke|p1|"):
                            stateDict.Team1.add(extractpokemonfromline(line));
                            break;
                        case line.includes("|poke|p2|"):
                            stateDict.Team2.add(extractpokemonfromline(line));
                            break;
                        case line.includes("|faint|"):
                            killattribution(stateDict, rows, i);
                            break;
                        case line.includes("|win|"):
                            stateDict.win = line.split("|")[2];
                            break;
                        default:
                            break;
                    }
                }
                console.log(stateDict);

                return stateDict;
            }

            function cleanandenrichlink(replayurl) {
                replayurl = replayurl.trim();
                if (
                    replayurl.substring(
                        0,
                        "https://replay.pokemonshowdown.com/".length,
                    ) != "https://replay.pokemonshowdown.com/"
                ) {
                    console.log("not valide prefix");
                    throw new Error(
                        'Prefix is not "https://replay.pokemonshowdown.com/"!',
                    );
                }
                if (
                    replayurl.substring(
                        replayurl.length - 4,
                        replayurl.length,
                    ) != ".log"
                ) {
                    return replayurl.concat(".log");
                }
                return replayurl;
            }

            function outputstring(
                Player1,
                Player2,
                Team1,
                Team2,
                Killlist,
                warnings,
                win,
            ) {
                let outputstring =
                    "Players: \n" +
                    Player1 +
                    "\n" +
                    Player2 +
                    "\n" +
                    "WIN: " +
                    win +
                    "\n\n" +
                    "Team of " +
                    Player1 +
                    ": \n";
                for (const mon of Team1) {
                    outputstring = outputstring.concat(mon + "\n");
                }
                outputstring = outputstring.concat(
                    "\n" + "Team of " + Player2 + ": \n",
                );
                for (const mon of Team2) {
                    outputstring = outputstring.concat(mon + "\n");
                }
                //when the rest is finished it comes here.
                return outputstring;
            }

            async function main() {
                //##################This Part of the code  concerns itself with the retreaval of the log ###########
                const url = document.getElementById("urlInput").value;
                const version = document.getElementById("versionSelect").value;
                const output = document.getElementById("output");
                let cleanur = "";
                let data = "";

                if (!url) {
                    alert("Please paste a link first!");
                    return;
                }
                try {
                    cleanurl = cleanandenrichlink(url);
                } catch (error) {
                    output.innerText = "Error: URL ist nicht valide";
                    console.error(error);
                    return;
                }
                output.innerText = "Fetching data...";

                try {
                    // Note: Direct browser fetching of other domains often hits CORS blocks.
                    // If the link is a direct .log file, we attempt to fetch it.
                    const response = await fetch(cleanurl);

                    if (!response.ok)
                        throw new Error(
                            "Could not reach the URL. Check for CORS restrictions.",
                        );

                    data = await response.text();

                    // Basic processing: Displaying the version selected + the log content
                    output.innerText =
                        "Successful capture of Data, beginning Processing :)";
                } catch (error) {
                    output.innerText =
                        "Error: " +
                        error.message +
                        "\n\nNote: Browsers often block cross-site requests (CORS). If this fails, you may need a CORS proxy or to run this on a local server.";
                    return;
                }

                //##################This pat of the Code is the analysis of the fetched data ###########

                console.log("Start of Processing");
                let rows = data.split("\n");
                //Beispiellink
                //https://replay.pokemonshowdown.com/gen9natdex6v6doublesdraft-2562550639-gix165y8nt2qk0u4o5meb7bfmqv2bcfpw
                //Beginning with the analisys of the content

                Results = analyze(rows);
                let {
                    Player1,
                    Player2,
                    Team1,
                    Team2,
                    Killlist,
                    warnings,
                    win,
                } = Results;

                console.log("Processing Complete");
                console.log(Team1);

                for (const mon of Team1) {
                    console.log(mon);
                }

                output.innerText = outputstring(
                    Player1,
                    Player2,
                    Team1,
                    Team2,
                    Killlist,
                    warnings,
                    win,
                );
            }
        </script>
    </body>
</html>
